  <style>
    * { font-family: 'Press Start 2P', cursive !important; }
    body { background: #212529; color: #fff; padding: 8px; font-size: .65rem; line-height: 1.8; min-height: 100dvh; }
    .container { max-width: 480px; margin: 0 auto; }
    h1 { font-size: .85rem; color: #facc15; text-align: center; margin: 8px 0; text-shadow: 2px 2px #b8860b; }
    h2 { font-size: .6rem; color: #92c5eb; margin-bottom: 6px; }

    .nes-container { margin-bottom: 10px !important; }
    .nes-container.is-dark { background: #2a2e33; color: #fff; }
    .nes-container.is-dark .title { font-size: .5rem; color: #facc15; background: #2a2e33; }

    /* Date nav */
    .date-nav { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
    .date-nav button { font-family: 'Press Start 2P', cursive !important; font-size: .5rem; padding: 4px 10px; }
    .date-nav .current-date { font-size: .55rem; min-width: 110px; text-align: center; color: #fff; }

    /* Encouragement */
    .encouragement { text-align: center; padding: 8px; font-size: .5rem; color: #212529; background: #facc15; margin-bottom: 10px; image-rendering: pixelated; }

    /* Alert */
    .alert-paused { text-align: center; padding: 8px; font-size: .5rem; color: #fff; background: #c0392b; border: 4px solid #e74c3c; margin-bottom: 10px; }

    /* Score */
    .score-display { font-size: .8rem; color: #fff; margin-bottom: 4px; }
    .score-display small { font-size: .5rem; color: #888; }
    .score-display .bonus-pts { color: #facc15; font-size: .55rem; }

    /* NES progress */
    progress.nes-progress { height: 24px; margin-bottom: 4px; }

    /* Rank */
    .rank-badge { font-size: .45rem; padding: 2px 6px; border: 2px solid; display: inline-block; margin-top: 4px; }
    .rank-rookie { border-color: #555; color: #888; }
    .rank-rising { border-color: #3b82f6; color: #60a5fa; }
    .rank-star { border-color: #facc15; color: #facc15; }
    .rank-legend { border-color: #22c55e; color: #4ade80; }
    .rank-champion { border-color: #facc15; color: #facc15; animation: pixelGlow 1s infinite; }
    @keyframes pixelGlow { 0%,100% { text-shadow: 0 0 4px #facc15; } 50% { text-shadow: 0 0 16px #facc15, 0 0 24px #f59e0b; } }

    /* Quest rows */
    .star-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 2px dashed #3a3e43; font-size: .5rem; }
    .star-row:last-child { border-bottom: none; }
    .star-row .name { color: #ccc; flex: 1; }
    .stars { display: flex; gap: 2px; font-size: .7rem; }
    .stars .star-filled { color: #facc15; animation: starBlink 2.5s ease-in-out infinite; display: inline-block; }
    .stars .star-filled:nth-child(1) { animation-delay: 0s; }
    .stars .star-filled:nth-child(2) { animation-delay: .6s; }
    .stars .star-filled:nth-child(3) { animation-delay: 1.2s; }
    .stars .star-filled:nth-child(4) { animation-delay: 1.8s; }
    .stars .star-empty { color: #3a3e43; }
    @keyframes starBlink { 0%,100% { color: #facc15; } 15% { color: #fff; } 30% { color: #facc15; } }

    .star-row.deal-breaker-row { background: #3a2020; margin: 0 -12px; padding: 6px 12px; }
    .deal-breaker-tag { font-size: .35rem; color: #ff6b6b; border: 1px solid #ff6b6b; padding: 1px 3px; margin-left: 3px; }
    .star-status.missed { color: #ff6b6b; font-size: .4rem; margin-left: 3px; }

    /* Recovery */
    .recovery-section { display: flex; align-items: center; gap: 8px; padding: 8px; border: 2px dashed #3a3e43; }
    .recovery-section.dormant { opacity: .3; }
    .recovery-section.earned { border-color: #facc15; opacity: 1; }
    .recovery-icon { font-size: 1rem; }
    .recovery-info .recovery-title { font-size: .5rem; color: #facc15; }
    .recovery-info .recovery-desc { font-size: .35rem; color: #666; }
    .recovery-stars { font-size: .7rem; }
    .recovery-stars .star-filled { color: #f59e0b; }
    .recovery-stars .star-empty { color: #3a3e43; }

    /* Privileges */
    .privilege-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .privilege-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
    .badge { text-align: center; padding: 8px 4px; border: 4px solid #3a3e43; font-size: .45rem; background: #2a2e33; }
    .badge .icon { font-size: .9rem; display: block; margin-bottom: 4px; }
    .badge .sub { font-size: .35rem; display: block; margin-top: 2px; color: #888; }
    .badge.unlocked { border-color: #22c55e; color: #4ade80; }
    .badge.locked { border-color: #3a3e43; color: #555; }
    .badge.paused { border-color: #f59e0b; color: #fbbf24; }

    /* Weekly bar chart */
    .mini-week { display: flex; align-items: flex-end; justify-content: space-between; margin-top: 8px; gap: 3px; height: 60px; }
    .mini-week .mini-day { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; cursor: pointer; }
    .mini-week .mini-day .bar-val { font-size: .4rem; color: #888; text-align: center; margin-bottom: 1px; }
    .mini-week .mini-day .day-bar-wrap { flex: 1; width: 100%; display: flex; align-items: flex-end; justify-content: center; }
    .mini-week .mini-day .day-bar { width: 100%; min-height: 2px; background: #22c55e; image-rendering: pixelated; }
    .mini-week .mini-day .day-bar.today { background: #22c55e; }
    .mini-week .mini-day .day-bar.zero { background: #333; }
    .mini-week .mini-day .day-bar.perfect { background: #facc15; box-shadow: 0 0 6px rgba(250,204,21,.5); }
    .mini-week .mini-day .day-label { font-size: .3rem; color: #555; text-align: center; margin-top: 2px; line-height: 1.4; }

    /* Streaks */
    .streak-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 2px dashed #3a3e43; font-size: .45rem; }
    .streak-row:last-child { border-bottom: none; }
    .streak-row .streak-name { color: #ccc; }
    .streak-row .streak-value.active { color: #ff6b35; }
    .streak-row .streak-value.inactive { color: #3a3e43; }

    /* Bottom links */
    .bottom-link { text-align: center; padding: 10px 0; }
    .bottom-link a { color: #555; font-size: .4rem; text-decoration: none; }
  </style>
</head>

    var CLOUD_URL = 'https://script.google.com/macros/s/AKfycbxV6VNfQkEmXdh3kXjg3R1R8intLpsnKrIpbO_5V5kyjhkeXrzsYzUmu3RxfbkSOeW4/exec';
    var STORAGE_KEY = 'adhd-privilege-tracker';
    var MAX_RECOVERY = 2;
    var _memoryStore = null;
    var _cloudData = null;

    function loadData() {
      if (_cloudData) return JSON.parse(JSON.stringify(_cloudData));
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        if (raw) {
          try { return JSON.parse(raw); } catch(e) { /* fall through */ }
        }
      } catch(e) {
        if (_memoryStore) return JSON.parse(JSON.stringify(_memoryStore));
      }
      return { days: {} };
    }

    function pullFromCloud(callback) {
      var url = CLOUD_URL + '?t=' + Date.now();
      fetch(url, { redirect: 'follow', cache: 'no-store' })
        .then(function(r) { return r.text(); })
        .then(function(text) {
          try {
            _cloudData = JSON.parse(text);
            try { localStorage.setItem(STORAGE_KEY, text); } catch(e) { /* ok */ }
          } catch(e) { /* bad json */ }
          if (callback) callback();
        })
        .catch(function() { if (callback) callback(); });
    }

    function getTodayKey() {
      var d = new Date();
      return d.getFullYear() + '-' +
        String(d.getMonth() + 1).padStart(2, '0') + '-' +
        String(d.getDate()).padStart(2, '0');
    }

    function getDateKey(date) {
      return date.getFullYear() + '-' +
        String(date.getMonth() + 1).padStart(2, '0') + '-' +
        String(date.getDate()).padStart(2, '0');
    }

      { field: 'chores', name: 'Do Chores / Clean Room', max: 2, aon: false },

      { field: 'earnMoney', name: 'Earn Money', max: 3, aon: true },
      { field: 'noDitching', name: 'Be Where Expected', max: 4, aon: true }
    ];
    var SUNDAY_CATEGORIES = [
      { field: 'churchAttitude', name: 'Good Attitude Before Church', max: 2, aon: true },
      { field: 'sabbathActivity', name: 'Good Sabbath Activity', max: 2, aon: true },

      { field: 'studyScriptures', name: 'Study Scriptures', max: 3, aon: true },
      { field: 'noDitching', name: 'Be Where Expected', max: 4, aon: true }
    ];

    function getCategoriesForDate(key) {
      var d = new Date(key + 'T12:00:00');
      var dow = d.getDay();
      if (dow === 6) return SATURDAY_CATEGORIES;
      if (dow === 0) return SUNDAY_CATEGORIES;
      return WEEKDAY_CATEGORIES;
    }

    function getMaxDailyForDate(key) {
      var cats = getCategoriesForDate(key);
      var total = 0;
      for (var i = 0; i < cats.length; i++) total += cats[i].max;
      return total;
    }

    function getDayData(data, key) {
      return data.days[key] || {
        chores: null, electronicsRules: null, noSneaking: null,
        noDitching: null, recoveryBonus: null,
        cleanLocker: null, practiceMusic: null, earnMoney: null,
        churchAttitude: null, sabbathActivity: null, studyScriptures: null,
        dealBreaker: false, privilegesPaused: false, notes: ''
      };
    }

    function calculateBaseForDate(day, key) {
      var cats = getCategoriesForDate(key);
      var total = 0;
      for (var i = 0; i < cats.length; i++) total += (day[cats[i].field] || 0);
      return total;
    }

    function calculateTotalForDate(day, key) {
      return calculateBaseForDate(day, key) + (day.recoveryBonus || 0);
    }

    function calculateRolling7DayTotal(data, endKey) {
      var end = new Date(endKey + 'T12:00:00');
      var total = 0;
      for (var i = 0; i < 7; i++) {
        var d = new Date(end);
        d.setDate(d.getDate() - i);
        var k = getDateKey(d);
        var day = getDayData(data, k);
        total += calculateTotalForDate(day, k);
      }
      return total;
    }

      function pick(arr) {
        // Use the date as seed so the same day always shows the same message
        var dayNum = 0;
        var key = isToday ? getTodayKey() : currentKey();
        for (var i = 0; i < key.length; i++) dayNum += key.charCodeAt(i);
        return arr[dayNum % arr.length];
      }

      if (isToday) {
        if (pct === 1) return pick(todayPerfect);
        if (pct >= 0.75) return pick(todayHigh);
        if (pct >= 0.5) return pick(todayMid);
        if (pct >= 0.25) return pick(todayLow);
        if (total > 0) return pick(todayLow);
        return pick(todayZero);
      } else {
        if (pct === 1) return pick(pastPerfect);
        if (pct >= 0.75) return pick(pastHigh);
        if (pct >= 0.5) return pick(pastMid);
        if (pct >= 0.25) return pick(pastLow);
        if (total > 0) return pick(pastLow);
        return pick(pastZero);
      }
    }

    /* ── Stars Helper ── */
    // earned: null = unscored, 0 = failed/missed, >0 = earned
    function renderStars(earned, max, allOrNothing, isPast) {
      var html = '';
      var starCount = max;
      if (earned === null) {
        // Unscored — all gray, dimmed
        for (var i = 0; i < starCount; i++) {
          html += '<span class="star-empty" style="opacity:.3">\u2605</span>';
        }
        return html;
      }
      if (earned === 0 && allOrNothing) {
        // Failed on all-or-nothing category — dizzy faces
        for (var i = 0; i < starCount; i++) {
          html += '<span style="font-size:1.1rem">\uD83D\uDE35</span>';
        }
        return html;
      }
      var filled;
      if (max === 4) {
        filled = (earned >= 4) ? 4 : 0;
      } else {
        filled = earned;
      }
      for (var i = 0; i < starCount; i++) {
        if (i < filled) {
          html += '<span class="star-filled">\u2605</span>';
        } else if (isPast) {
          html += '<span style="font-size:1.1rem">\uD83D\uDE35</span>';
        } else {
          html += '<span class="star-empty">\u2605</span>';
        }
      }
      return html;
    }

    /* ── Rank System ── */
    /* ── Confetti (canvas-confetti) ── */
    function fireConfetti() {
      if (typeof confetti === 'undefined') return;
      var gold = ['#FFD700','#facc15','#fbbf24','#f59e0b','#eab308','#FFC107','#DAA520'];
      var accent = ['#22c55e','#3b82f6','#ec4899','#8b5cf6'];
      var all = gold.concat(gold).concat(gold).concat(accent); // 75% gold

      // Big center cannon from bottom
      confetti({ particleCount: 120, spread: 90, startVelocity: 55, origin: { x: 0.5, y: 1 }, colors: all, ticks: 300, gravity: 0.8, scalar: 1.2 });

      // Left cannon
      setTimeout(function() {
        confetti({ particleCount: 60, angle: 60, spread: 60, startVelocity: 50, origin: { x: 0, y: 0.9 }, colors: all, ticks: 250, gravity: 0.9 });
      }, 100);

      // Right cannon
      setTimeout(function() {
        confetti({ particleCount: 60, angle: 120, spread: 60, startVelocity: 50, origin: { x: 1, y: 0.9 }, colors: all, ticks: 250, gravity: 0.9 });
      }, 100);

      // Second center burst (bigger, delayed)
      setTimeout(function() {
        confetti({ particleCount: 80, spread: 120, startVelocity: 40, origin: { x: 0.5, y: 1 }, colors: gold, ticks: 200, gravity: 0.6, scalar: 1.5, drift: 0 });
      }, 300);

      // Star shapes burst
      setTimeout(function() {
        confetti({ particleCount: 40, spread: 360, startVelocity: 30, origin: { x: 0.5, y: 0.5 }, colors: gold, ticks: 150, gravity: 0.3, scalar: 2, shapes: ['star'] });
      }, 500);

      // Final gold rain
      setTimeout(function() {
        confetti({ particleCount: 100, spread: 160, startVelocity: 15, origin: { x: 0.5, y: 0 }, colors: gold, ticks: 300, gravity: 1.5, scalar: 0.8, drift: 1 });
      }, 700);
    }

    function getRank(total, maxDaily) {
      var m = maxDaily || 10;
      if (total > m)        return { title: 'Overachiever', cls: 'rank-champion', icon: '\uD83E\uDD2F' };
      if (total >= m)       return { title: 'Perfect', cls: 'rank-legend', icon: '\u2B50' };
      if (total >= m * 0.6) return { title: 'Rising Star', cls: 'rank-star', icon: '\uD83C\uDF1F' };
      if (total >= m * 0.2) return { title: 'On the Board', cls: 'rank-rising', icon: '\uD83D\uDE80' };
      return { title: 'Just Getting Started', cls: 'rank-rookie', icon: '\uD83C\uDFAF' };
    }

    /* ── Streak Calculator ── */
    function dayHasScores(day) {
      // Check if any scoring field has been entered
      var fields = ['chores','electronicsRules','noSneaking','noDitching',
        'cleanLocker','practiceMusic','earnMoney','churchAttitude',
        'sabbathActivity','studyScriptures','recoveryBonus'];
      for (var i = 0; i < fields.length; i++) {
        if (day[fields[i]]) return true;
      }
      return false;
    }

    function calculateStreaks(data, endKey) {
      var streakFields = [
        { field: 'noSneaking', name: 'No Sneaking / Stealing', max: 2 },
        { field: 'noDitching', name: 'Be Where Expected', max: 4 }
      ];
      var streaks = [];
      for (var c = 0; c < streakFields.length; c++) {
        var cat = streakFields[c];
        var streak = 0;
        var d = new Date(endKey + 'T12:00:00');
        for (var i = 0; i < 30; i++) {
          var k = getDateKey(d);
          var day = getDayData(data, k);
          var dayCats = getCategoriesForDate(k);
          var relevant = false;
          for (var j = 0; j < dayCats.length; j++) {
            if (dayCats[j].field === cat.field) { relevant = true; break; }
          }
          if (relevant && (day[cat.field] || 0) >= cat.max) {
            streak++;
            d.setDate(d.getDate() - 1);
          } else if (i === 0 && day[cat.field] === null) {
            // Today unscored — skip without breaking
            d.setDate(d.getDate() - 1);
          } else {
            break;
          }
        }
        streaks.push({ name: cat.name, count: streak });
      }
      // Perfect day streak
      var perfectStreak = 0;
      var pd = new Date(endKey + 'T12:00:00');
      for (var i = 0; i < 30; i++) {
        var k = getDateKey(pd);
        var day = getDayData(data, k);
        if (calculateBaseForDate(day, k) >= getMaxDailyForDate(k)) {
          perfectStreak++;
          pd.setDate(pd.getDate() - 1);
        } else if (i === 0 && !dayHasScores(day)) {
          // Today unscored — skip rather than break
          pd.setDate(pd.getDate() - 1);
        } else {
          break;
        }
      }
      streaks.push({ name: 'Perfect Day', count: perfectStreak });
      return streaks;
    }

    /* ── App State ── */
    var currentDate = new Date(getTodayKey() + 'T12:00:00');

    function currentKey() {
      return getDateKey(currentDate);
    }

    /* ── Render ── */
    function render() {
      var data = loadData();
      var key = currentKey();
      var todayKey = getTodayKey();
      var isToday = key === todayKey;
      var day = getDayData(data, key);
      var cats = getCategoriesForDate(key);
      var MAX_DAILY = getMaxDailyForDate(key);
      var baseTotal = calculateBaseForDate(day, key);
      var recovery = day.recoveryBonus || 0;
      var total = baseTotal + recovery;
      var rolling7 = calculateRolling7DayTotal(data, key);
      var paused = day.dealBreaker;
      var privs = getPrivileges(total, rolling7, paused);

      // Date nav
      var dateLabel = isToday ? 'Today' : formatDateShort(key);
      document.getElementById('current-date').textContent = dateLabel;
      document.getElementById('current-date-bottom').textContent = dateLabel;
      document.getElementById('next-day').disabled = isToday;
      document.getElementById('next-day').style.opacity = isToday ? '.3' : '1';
      document.getElementById('next-day-bottom').disabled = isToday;
      document.getElementById('next-day-bottom').style.opacity = isToday ? '.3' : '1';

      // Encouragement
      document.getElementById('encouragement').textContent = getEncouragement(total, MAX_DAILY, isToday);

      // Paused alert
      document.getElementById('paused-alert').style.display = paused ? 'block' : 'none';

      // Score display
      var scoreHtml = total + ' <small>/ ' + MAX_DAILY + ' pts</small>';
      if (recovery > 0) {
        scoreHtml += ' <span class="bonus-pts">+' + recovery + '</span>';
      }
      document.getElementById('score-display').innerHTML = scoreHtml;

      // NES Progress bar
      var BAR_MAX = MAX_DAILY;
      var basePct = Math.min(100, (baseTotal / BAR_MAX) * 100);
      var progressBar = document.getElementById('progress-bar');
      progressBar.value = basePct;
      progressBar.max = 100;
      progressBar.className = 'nes-progress ' + (paused ? 'is-warning' : 'is-success');
      var bonusInd = document.getElementById('bonus-indicator');
      if (recovery > 0) {
        bonusInd.textContent = '+' + recovery + ' BONUS';
        bonusInd.style.display = 'block';
      } else {
        bonusInd.style.display = 'none';
      }

      // (scale removed — too busy)

      // Confetti on perfect day
      if (baseTotal >= MAX_DAILY) {
        fireConfetti();
      }

      // Rank badge
      var rank = getRank(total, MAX_DAILY);
      document.getElementById('rank-badge').innerHTML =
        '<span class="rank-badge ' + rank.cls + '">' + rank.icon + ' ' + rank.title + '</span>';

      // Star breakdown (dynamic based on day type)
      var dealBreakerFields = ['noDitching', 'noSneaking'];
      var breakdownHtml = '';
      for (var i = 0; i < cats.length; i++) {
        var c = cats[i];
        var fieldVal = day[c.field];
        var isDealBreakerRow = paused && dealBreakerFields.indexOf(c.field) >= 0;
        var rowClass = 'star-row';
        if (isDealBreakerRow) rowClass += ' deal-breaker-row';
        else if (fieldVal === null) rowClass += ' unscored';
        else if (fieldVal === 0 && c.aon) rowClass += ' failed';

        var statusTag = '';
        var isPast = !isToday;
        if (isDealBreakerRow) {
          statusTag = ' <span class="deal-breaker-tag">DEAL BREAKER</span>';
        } else if (fieldVal === 0 && c.aon) {
          statusTag = ' <span class="star-status missed">missed</span>';
        } else if (isPast && !c.aon && fieldVal !== null && fieldVal > 0 && fieldVal < c.max) {
          statusTag = ' <span class="star-status missed">partially missed</span>';
        } else if (isPast && !c.aon && (fieldVal === 0 || fieldVal === null)) {
          statusTag = ' <span class="star-status missed">missed</span>';
        }

        breakdownHtml += '<div class="' + rowClass + '">' +
          '<span class="name">' + c.name + statusTag + '</span>' +
          '<span class="stars">' + renderStars(fieldVal, c.max, c.aon, !isToday) + '</span>' +
          '</div>';
      }
      document.getElementById('breakdown').innerHTML = breakdownHtml;

      // Recovery bonus section
      var recSection = document.getElementById('recovery-section');
      recSection.className = 'recovery-section ' + (recovery > 0 ? 'earned' : 'dormant');
      var recStarsHtml = '';
      for (var i = 0; i < MAX_RECOVERY; i++) {
        if (i < recovery) {
          recStarsHtml += '<span class="star-filled">\u2605</span>';
        } else {
          recStarsHtml += '<span class="star-empty">\u2605</span>';
        }
      }
      document.getElementById('recovery-stars').innerHTML = recStarsHtml;

      // Streaks
      var streaks = calculateStreaks(data, key);
      var streakHtml = '';
      for (var i = 0; i < streaks.length; i++) {
        var s = streaks[i];
        var flames = '';
        var cls = 'inactive';
        if (s.count > 0) {
          cls = 'active';
          var flameCount = Math.min(3, Math.ceil(s.count / 2));
          for (var f = 0; f < flameCount; f++) flames += '\uD83D\uDD25';
        }
        var label = s.count > 0
          ? flames + ' ' + s.count + ' day' + (s.count > 1 ? 's' : '')
          : '\u2014';
        streakHtml += '<div class="streak-row">' +
          '<span class="streak-name">' + s.name + '</span>' +
          '<span class="streak-value ' + cls + '">' + label + '</span>' +
          '</div>';
      }
      document.getElementById('streaks').innerHTML = streakHtml;

      // Daily date
      var dailyDate = new Date(key + 'T12:00:00');
      document.getElementById('daily-date').textContent =
        dailyDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

      // Daily privileges
      var dailyPrivs = [privs.spotify, privs.phone1hr, privs.phoneAllDay];
      var dailyHtml = '';
      for (var i = 0; i < dailyPrivs.length; i++) {
        var p = dailyPrivs[i];
        var cls = p.paused ? 'paused' : (p.unlocked ? 'unlocked' : 'locked');
        var status = p.paused ? 'Paused' : (p.unlocked ? '\u2713 Unlocked at ' + p.threshold + ' pts' : 'Need ' + p.threshold + ' pts');
        dailyHtml += '<div class="badge ' + cls + '">' +
          '<span class="icon">' + p.icon + '</span>' +
          '<span>' + p.name + '</span>' +
          '<span class="sub">' + status + '</span></div>';
      }
      document.getElementById('daily-privileges').innerHTML = dailyHtml;

      // 7-day bar chart
      var dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      var chartMax = 15;
      var miniHtml = '<div class="mini-week">';
      for (var mi = 6; mi >= 0; mi--) {
        var md = new Date(key + 'T12:00:00');
        md.setDate(md.getDate() - mi);
        var mk = getDateKey(md);
        var mday = getDayData(data, mk);
        var mTotal = calculateTotalForDate(mday, mk);
        var mMax = getMaxDailyForDate(mk);
        var mIsToday = mk === todayKey;
        var barH = chartMax > 0 ? Math.max(2, (mTotal / chartMax) * 100) : 2;
        var barCls = 'day-bar';
        if (mTotal >= mMax && mTotal > 0) barCls += ' perfect';
        else if (mIsToday) barCls += ' today';
        else if (mTotal === 0) barCls += ' zero';
        miniHtml += '<div class="mini-day" data-date="' + mk + '" style="cursor:pointer">' +
          '<div class="bar-val">' + mTotal + '</div>' +
          '<div class="day-bar-wrap">' +
            '<div class="' + barCls + '" style="height:' + barH + '%"></div>' +
          '</div>' +
          '<div class="day-label">' + dayNames[md.getDay()] + '<br>' + (md.getMonth()+1) + '/' + md.getDate() + '</div>' +
          '</div>';
      }
      miniHtml += '</div>';

      // Weekly date range
      var rangeEnd = new Date(key + 'T12:00:00');
      var rangeStart = new Date(rangeEnd);
      rangeStart.setDate(rangeStart.getDate() - 6);
      var fmtOpts = { month: 'short', day: 'numeric' };
      document.getElementById('weekly-range').textContent =
        rangeStart.toLocaleDateString('en-US', fmtOpts) + ' \u2013 ' +
        rangeEnd.toLocaleDateString('en-US', fmtOpts);

      // Weekly totals
      var weeklyPrivs = [privs.friendsHome, privs.churchDance, privs.friendsOut];
      var MAX_WEEKLY = 0;
      var wd = new Date(key + 'T12:00:00');
      for (var wi = 0; wi < 7; wi++) {
        var wk = getDateKey(wd);
        MAX_WEEKLY += getMaxDailyForDate(wk);
        wd.setDate(wd.getDate() - 1);
      }

      document.getElementById('weekly-bar').innerHTML =
        '<div style="font-size:1.4rem;font-weight:700;margin-bottom:6px">' +
          rolling7 + ' <small style="font-size:.85rem;font-weight:400;color:var(--muted)">/ ' + MAX_WEEKLY + ' pts</small>' +
        '</div>' + miniHtml;

      // Wire up bar chart day clicks
      var barDays = document.querySelectorAll('.mini-day[data-date]');
      for (var bi = 0; bi < barDays.length; bi++) {
        (function(el) {
          el.addEventListener('click', function() {
            var dateKey = el.getAttribute('data-date');
            currentDate = new Date(dateKey + 'T12:00:00');
            render();
            window.scrollTo(0, 0);
          });
        })(barDays[bi]);
      }

      // Weekly privileges
      var weeklyHtml = '';
      for (var i = 0; i < weeklyPrivs.length; i++) {
        var p = weeklyPrivs[i];
        var cls = p.paused ? 'paused' : (p.unlocked ? 'unlocked' : 'locked');
        var needed = p.threshold - p.current;
        var status = p.paused ? 'Paused' : (p.unlocked ? '\u2713 Unlocked at ' + p.threshold + ' pts' : 'Need ' + p.threshold + ' pts');
        weeklyHtml += '<div class="badge ' + cls + '">' +
          '<span class="icon">' + p.icon + '</span>' +
          '<span>' + p.name + '</span>' +
          '<span class="sub">' + status + '</span></div>';
      }
      document.getElementById('weekly-privileges').innerHTML = weeklyHtml;
    }

    // Date navigation
    function goBack() {
      currentDate.setDate(currentDate.getDate() - 1);
      render();
    }
    function goForward() {
      var todayKey = getTodayKey();
      var nextDate = new Date(currentDate);
      nextDate.setDate(nextDate.getDate() + 1);
      if (getDateKey(nextDate) <= todayKey) {
        currentDate = nextDate;
        render();
      }
    }
    document.getElementById('prev-day').addEventListener('click', goBack);
    document.getElementById('next-day').addEventListener('click', goForward);
    document.getElementById('prev-day-bottom').addEventListener('click', goBack);
    document.getElementById('next-day-bottom').addEventListener('click', goForward);

    // Show local data immediately, then pull cloud data
    render();
    pullFromCloud(function() { render(); });

    // Re-sync from cloud when she switches back to the app
    document.addEventListener('visibilitychange', function() {
      if (!document.hidden) {
        pullFromCloud(function() { render(); });
      }
    });

    // Also poll cloud every 60 seconds
    setInterval(function() {
      pullFromCloud(function() { render(); });
    }, 60000);
  </script>
</body></html>
